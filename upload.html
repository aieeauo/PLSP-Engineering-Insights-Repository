<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PLSP Eng'g Insights Repository</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="upload.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
    <nav class="navbar navbar-dark container">
        <a class="navbar-brand" href="index.html">PLSP Eng'g Insights Repository</a>

        <div class="ms-auto d-flex align-items-center gap-4">
            <a href="index.html" class="text-dim small text-decoration-none">Home</a>
            <a href="about.html" class="text-dim small text-decoration-none">About</a>
            <a href="contactfaculty.html" class="student-only-link text-dim small text-decoration-none">
            Contact Faculty
        </a>
            <a href="admin.html" class="instructor-link text-dim small text-decoration-none" style="display: none;">
            <i class="fas fa-lock"></i> Admin
            </a>
            <a href="portalaccess.html" class="btn-portalaccess text-decoration-none">Portal Access</a>
        </div>
    </nav>

    <main class="admin-wrapper">
    <header class="admin-header-centered">
        <h1>Upload New Resource</h1>
        <p>Add PDF modules or video lectures to the PLSP Engineering Repository.</p>
    </header>

    <section class="upload-section">
        <form class="upload-form">
            <div class="drop-zone" id="drop-zone">
                <div id="drop-zone-prompt">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>Drag and drop your file here or <span>Browse</span></p>
                </div>
    
                <div id="file-info" style="display: none;">
                    <i class="fa-solid fa-file-circle-check" style="color: var(--accent-gold);"></i>
                    <p id="file-name" style="margin: 10px 0; font-weight: bold;"></p>
                    <button type="button" onclick="clearFile(event)" class="btn-remove">Remove File</button>
                </div>
    
                <input type="file" id="file-upload" hidden>
            </div>

            <div class="form-grid">
                <div class="input-group">
                    <label>Resource Title</label>
                    <input type="text" placeholder="e.g., Logic Circuit Design Part 1" required>
                </div>

                <div class="input-group">
                    <label>Resource Type</label>
                    <select class="portal-select">
                        <option value="pdf">PDF Module</option>
                        <option value="video">Video Lecture</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Description</label>
                    <textarea placeholder="Briefly describe the contents..." rows="4"></textarea>
                </div>

                <form action="repository.html">
                    <button type="submit" class="btn-publish" style="width: 100%;">Publish to Repository</button>
                </form>
            </div>
        </form>
    </section>
</main>

<a href="admin.html" class="btn-back">
        <i class="fa-solid fa-chevron-left"></i> Back to Dashboard
    </a>

<div id="status-msg" style="display: none; text-align: center; margin-top: 15px; padding: 10px; border-radius: 5px;">
    </div>

<script src="upload.js"></script>
<script src="mgmt.js"></script>

</body>
</html>
