<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PLSP Eng'g Insights Repository</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="student-auth.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
    <nav class="navbar navbar-dark container">
        <a class="navbar-brand" href="index.html">PLSP Eng'g Insights Repository</a>

        <div class="ms-auto d-flex align-items-center gap-4">
            <a href="index.html" class="text-dim small text-decoration-none">Home</a>
            <a href="about.html" class="text-dim small text-decoration-none">About</a>
            <a href="contactfaculty.html" class="text-dim small text-decoration-none">Contact Faculty</a>
            <a href="admin.html" class="instructor-link text-dim small text-decoration-none" style="display: none;">
            <i class="fas fa-lock"></i> Admin
            </a>
            <a href="portalaccess.html" class="btn-portalaccess text-decoration-none">Portal Access</a>
        </div>
    </nav>

<main class="auth-container">
    <div class="auth-tabs">
        <button class="tab-link" onclick="showForm('signup')">Sign up</button>
        <button class="tab-link active" onclick="showForm('login')">Log in</button>
    </div>

    <div id="signup-form" class="auth-content" style="display: none;">
        <h2>Student Registration</h2>
        <form class="signup-column">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Student Number (2X-XXXXX)" required>
            <input type="password" placeholder="Create Password" required>
            <button type="submit" class="btn-login-action">Create Student Account</button>
        </form>
    </div>

    <div id="login-form" class="auth-content">
        <h2>Student Portal</h2>
        <form class="login-row" action="repository.html">
            <input type="text" placeholder="Student Number (2X-XXXXX)" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn-login-action">Login</button>
        </form>
    </div>

    <a href="portalaccess.html" class="btn-back">
        <i class="fa-solid fa-chevron-left"></i> Back
    </a>
</main>

<script src="student-auth.js"></script>
<script src="mgmt.js"></script>

</body>
</html>
